<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Env Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Vault Env Manager</h1>
    </header>

    <div class="s3-section">
      <button id="s3Toggle" class="btn btn-s3-toggle">
        <span class="icon">☁️</span> Import from S3
        <span id="s3Arrow" class="s3-arrow">▼</span>
      </button>
      <div id="s3Content" class="s3-content">
        <div class="s3-form">
          <div class="s3-field-row">
            <div class="s3-field">
              <label for="s3Region">AWS Region</label>
              <input type="text" id="s3Region" class="input-field" placeholder="us-east-1">
            </div>
            <div class="s3-field">
              <label for="s3Bucket">Bucket Name</label>
              <input type="text" id="s3Bucket" class="input-field" placeholder="my-bucket">
            </div>
          </div>
          <label for="s3Key">File Path (S3 Key)</label>
          <input type="text" id="s3Key" class="input-field" placeholder="config/.env.production">
          <div class="s3-field-row">
            <div class="s3-field">
              <label for="s3AccessKey">Access Key ID</label>
              <input type="text" id="s3AccessKey" class="input-field" placeholder="AKIA...">
            </div>
            <div class="s3-field">
              <label for="s3SecretKey">Secret Access Key</label>
              <input type="password" id="s3SecretKey" class="input-field" placeholder="Secret key">
            </div>
          </div>
          <button id="s3ImportBtn" class="btn btn-primary">
            <span id="s3ImportText">Import from S3</span>
            <span id="s3Spinner" class="spinner hidden"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="input-section">
      <div class="paste-section">
        <h3>Paste .env file content:</h3>
        <textarea
          id="envInput"
          placeholder="Paste your .env file here...&#10;&#10;Example:&#10;DB_HOST=localhost&#10;DB_PORT=5432&#10;API_KEY=your-key"
          class="textarea-field"
        ></textarea>
        <button id="parseBtn" class="btn btn-primary">Convert to JSON</button>
      </div>
    </div>

    <div class="env-list" id="envList">
      <!-- Environment variables will be listed here -->
    </div>

    <div class="actions">
      <button id="exportBtn" class="btn btn-success">
        <span class="icon">📋</span> Copy JSON
      </button>
      <button id="downloadBtn" class="btn btn-info">
        <span class="icon">💾</span> Download .env
      </button>
      <button id="pushS3Btn" class="btn btn-s3-push">
        <span id="pushS3Text"><span class="icon">☁️</span> Push to S3</span>
        <span id="pushS3Spinner" class="spinner hidden"></span>
      </button>
      <button id="clearBtn" class="btn btn-danger">Clear All</button>
    </div>

    <div class="json-preview" id="jsonPreview">
      <h3>JSON Preview</h3>
      <pre id="jsonOutput">{}</pre>
    </div>
  </div>

  <div id="notification" class="notification"></div>

  <script src="popup.js"></script>
</body>
</html>
